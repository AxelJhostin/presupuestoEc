<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo -->
  <rect width="1200" height="630" fill="#1D4ED8"/>
  
  <!-- Gradiente sutil -->
  <rect width="1200" height="630" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Círculos decorativos -->
  <circle cx="1050" cy="100" r="200" fill="#ffffff" fill-opacity="0.04"/>
  <circle cx="150" cy="530" r="150" fill="#ffffff" fill-opacity="0.04"/>

  <!-- Logo P -->
  <rect x="160" y="200" width="80" height="80" rx="16" fill="white"/>
  <text x="200" y="256" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#1D4ED8" text-anchor="middle">P</text>

  <!-- Nombre -->
  <text x="270" y="256" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="white">PresupuestoEC</text>

  <!-- Línea separadora -->
  <rect x="160" y="310" width="500" height="3" fill="white" fill-opacity="0.3"/>

  <!-- Descripción -->
  <text x="160" y="370" font-family="Arial, sans-serif" font-size="28" fill="white" fill-opacity="0.9">Presupuestos de obra profesionales para Ecuador</text>

  <!-- Tags -->
  <rect x="160" y="410" width="110" height="40" rx="20" fill="white" fill-opacity="0.15"/>
  <text x="215" y="436" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">NEC</text>

  <rect x="285" y="410" width="110" height="40" rx="20" fill="white" fill-opacity="0.15"/>
  <text x="340" y="436" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">PDF</text>

  <rect x="410" y="410" width="110" height="40" rx="20" fill="white" fill-opacity="0.15"/>
  <text x="465" y="436" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">Excel</text>

  <rect x="535" y="410" width="110" height="40" rx="20" fill="white" fill-opacity="0.15"/>
  <text x="590" y="436" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">APU</text>

  <rect x="660" y="410" width="130" height="40" rx="20" fill="white" fill-opacity="0.15"/>
  <text x="725" y="436" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">Gratis</text>

